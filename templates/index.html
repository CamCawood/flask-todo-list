<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Flask To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="app-card">
            <header>
                <h1>TaskFlow</h1>
                <p>A clean Flask to-do list project for my portfolio</p>
            </header>

            <form action="{{ url_for('add_task') }}" method="POST" class="task-form">
                <input type="text" name="title" placeholder="Enter a new task..." required>
                <button type="submit">Add Task</button>
            </form>

            <div class="task-list">
                {% if tasks %}
                    {% for task in tasks %}
                        <div class="task-item {% if task.completed %}completed{% endif %}">
                            <div class="task-text">
                                {{ task.title }}
                            </div>

                            <div class="task-actions">
                                <a href="{{ url_for('toggle_task', task_id=task.id) }}" class="btn toggle-btn">
                                    {% if task.completed %}Undo{% else %}Complete{% endif %}
                                </a>
                                <a href="{{ url_for('delete_task', task_id=task.id) }}" class="btn delete-btn">
                                    Delete
                                </a>
                            </div>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="empty-state">
                        <p>No tasks yet. Add your first one.</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
